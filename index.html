<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALKHAS & SHEILA | Ligne Directe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>VOX ENGINE 4.2</h1>
      <div id="status-container" class="status-indicator">
        <span class="status-dot"></span>
        <span id="status-text">INITIALISATION DU SYSTÈME...</span>
      </div>
    </header>

    <main class="main-control">
      <div id="call-button">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-11h2v2h-2zm0 4h2v5h-2z"/>
        </svg>
      </div>

      <div class="visualizer-container" id="visualizer">
        <div class="wave-bar" style="animation-delay: -1.1s"></div>
        <div class="wave-bar" style="animation-delay: -0.9s"></div>
        <div class="wave-bar" style="animation-delay: -0.7s"></div>
        <div class="wave-bar" style="animation-delay: -0.5s"></div>
        <div class="wave-bar" style="animation-delay: -0.3s"></div>
        <div class="wave-bar" style="animation-delay: -0.1s"></div>
      </div>
    </main>

    <footer class="footer">
      ALKHAS <span>&</span> SHEILA | DIRECT CONNECTION
      <br><br>
      SYSTEM STATUS: <span id="sys-status">SECURE P2P</span>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
