<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Direct Call | Ligne Privée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>DIRECT</h1>
      <div id="status-container" class="status-indicator">
        <span class="status-dot"></span>
        <span id="status-text">Initialisation...</span>
      </div>
    </header>

    <main class="main-control">
      <!-- Un bouton pulse automatique -->
      <div id="call-button" class="calling" style="pointer-events: none;">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
      </div>

      <div class="visualizer-container" id="visualizer">
        <div class="wave-bar" style="animation-delay: -1.1s"></div>
        <div class="wave-bar" style="animation-delay: -0.9s"></div>
        <div class="wave-bar" style="animation-delay: -0.7s"></div>
        <div class="wave-bar" style="animation-delay: -0.5s"></div>
        <div class="wave-bar" style="animation-delay: -0.3s"></div>
        <div class="wave-bar" style="animation-delay: -0.1s"></div>
      </div>
    </main>

    <footer class="footer">
      Ligne Privée sans intermédiaire.<br>
      Ouvrez l'app pour parler. Fermez pour raccrocher.
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
